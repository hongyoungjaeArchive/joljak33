version: "3.9"

services:
  # ── Ollama LLM 엔진 ──────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: honeypot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── 모델 자동 다운로드 ────────────────────────────────────────────────────────
  model-pull:
    image: ollama/ollama:latest
    container_name: honeypot-model-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "llama3.1:8b"]
    restart: "no"

  # ── Next.js LLM 서비스 ────────────────────────────────────────────────────────
  api:
    build: .
    container_name: honeypot-nextjs
    ports:
      - "8001:8001"
    environment:
      - NODE_ENV=production
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ollama_data:
    driver: local
